<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVIDADE (ESSENCIAL) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Agendamento{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo extra -->
    <style>
        body {
            background-color: #f5f7fb;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .logo {
            max-width: 140px;
        }

        .btn-primary {
            border-radius: 8px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">

        <!-- RESPONSIVO CERTO -->
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <!-- LOGO / TOPO -->
            <div class="text-center mb-4">
                <!-- depois você pode puxar logo da clínica -->
                <h4 class="fw-bold">Agenda Fácil</h4>
            </div>

            <!-- CONTEÚDO -->
            {% block content %}
            {% endblock %}

            <!-- RODAPÉ -->
            <div class="text-center mt-4 text-muted" style="font-size: 14px;">
                © {{ now|date:"Y" }} Agenda Fácil
            </div>

        </div>

    </div>
</div>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
