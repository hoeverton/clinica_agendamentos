<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{{ clinica.nome }} | Agendamento{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .btn-primary {
            border-radius: 8px;
        }

        /* 🔥 CONTROLE REAL DE LARGURA */
        .container-agendamento {
            max-width: 500px;
            margin: 0 auto;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="container py-5">
    <div class="container-agendamento">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h4 class="fw-bold">Agenda Fácil</h4>
        </div>

        {% block content %}{% endblock %}

        <!-- FOOTER -->
        <div class="text-center mt-4 text-muted" style="font-size: 14px;">
            © {{ now|date:"Y" }} Agenda Fácil
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
