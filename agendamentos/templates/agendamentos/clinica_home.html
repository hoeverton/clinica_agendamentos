{% extends 'agendamentos/base_agendamento.html' %}

{% block title %}Passo 1{% endblock %}

{% block content %}

<style>
    .card-agendamento {
        border-radius: 16px;
        max-width: 500px;
        margin: 0 auto;
    }

    .nome-clinica {
        font-weight: 600;
        font-size: 22px;
        word-break: normal;
        white-space: normal;
    }

    .descricao {
        font-size: 15px;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        
        <!-- AGORA NÃO FICA MAIS ESTREITO -->
        <div class="col-12">

            <div class="card card-agendamento shadow border-0">
                <div class="card-body p-4 p-md-5 text-center">

                    <!-- NOME -->
                    <h1 class="nome-clinica mb-2">
                        {{ clinica.nome }}
                    </h1>

                    <!-- TEXTO -->
                    <p class="text-muted mb-4 descricao">
                        Agende sua consulta de forma rápida e fácil
                    </p>

                    <!-- BOTÃO -->
                    <a
                        href="{% url 'passo1_telefone' clinica_slug=clinica.slug %}"
                        class="btn btn-primary btn-lg w-100 mb-3">
                        Agendar agora
                    </a>

                    <a
                        href="{% url 'solicitar_codigo' %}"
                        class="btn btn-outline-secondary w-100">
                        Acessar minha conta
                    </a>

                    <hr class="my-4">

                    <a
                        href="{% url 'clinica_dashboard' %}"
                        class="text-decoration-none text-secondary small">
                        Área da Clínica
                    </a>

                </div>
            </div>

        </div>

    </div>
</div>

{% endblock %}
