{% extends 'agendamentos/base_agendamento.html' %}

{% block title %}Escolha o profissional{% endblock %}

{% block content %}

<style>
    .card-agendamento {
        max-width: 500px;
        margin: 0 auto;
        border-radius: 16px;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">

        <div class="col-12">

            <h3 class="text-center mb-4">Escolha o profissional</h3>

            <form method="POST" class="card card-agendamento p-4 shadow border-0">
                {% csrf_token %}

                <label class="form-label">Profissional:</label>

                <select name="profissional_id" class="form-select" required>
                    {% for profissional in profissionais %}
                        <option value="{{ profissional.id }}">
                            {{ profissional.nome }} ({{ profissional.especialidade }})
                        </option>
                    {% endfor %}
                </select>

                <button class="btn btn-primary w-100 mt-3">
                    Próximo
                </button>
            </form>

            <div class="text-center">
                <a href="{% url 'passo1_telefone' clinica.slug %}" class="btn btn-link mt-3">
                    ← Voltar ao início
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
