{% extends "clinica/base.html" %}

{% block title %}Conectar WhatsApp{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <!-- Topo -->
    <div class="mb-8">

        <h2 class="text-2xl md:text-4xl font-bold text-slate-800">
            📲 Conectar WhatsApp
        </h2>

        <p class="text-slate-500 mt-1">
            Escaneie o QR Code para integrar sua clínica ao WhatsApp
        </p>

    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8 text-center">

        <!-- Botão -->
        <button onclick="carregarQR()"
                class="bg-violet-600 hover:bg-violet-700 text-white px-6 py-3 rounded-xl font-semibold shadow-sm">
            Gerar QR Code
        </button>

        <!-- QR -->
        <div id="qr"
             class="mt-8 flex justify-center text-slate-500">
            Clique no botão para gerar o QR Code
        </div>

    </div>

    <!-- Voltar -->
    <div class="mt-6">

        <a href="{% url 'clinica_dashboard' %}"
           class="inline-block bg-slate-700 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-semibold">
            ⬅ Voltar ao Dashboard
        </a>

    </div>

</div>

<script>
function carregarQR() {

    document.getElementById("qr").innerHTML =
        '<div class="text-slate-500">Carregando QR Code...</div>';

    fetch("/whatsapp/qr/")
        .then(r => r.json())
        .then(data => {

            const qr = data.qrcode;

            if (qr) {

                document.getElementById("qr").innerHTML = `
                    <div class="space-y-4">
                        <img src="${qr}" class="mx-auto rounded-xl shadow-sm w-64">
                        <p class="text-sm text-slate-500">
                            Abra o WhatsApp no celular e escaneie o código.
                        </p>
                    </div>
                `;

            } else if (data.connected) {

                document.getElementById("qr").innerHTML = `
                    <div class="bg-green-100 text-green-700 px-6 py-4 rounded-xl font-semibold">
                        ✅ WhatsApp já conectado
                    </div>
                `;

            } else {

                document.getElementById("qr").innerHTML = `
                    <div class="bg-red-100 text-red-700 px-6 py-4 rounded-xl font-semibold">
                        ❌ QR Code não disponível
                    </div>
                `;
            }

        })
        .catch(e => {

            document.getElementById("qr").innerHTML = `
                <div class="bg-red-100 text-red-700 px-6 py-4 rounded-xl font-semibold">
                    Erro ao carregar QR Code
                </div>
            `;

            console.error(e);
        });
}
</script>

{% endblock %}
