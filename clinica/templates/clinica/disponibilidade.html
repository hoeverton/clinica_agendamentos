{% extends "clinica/base.html" %}

{% block title %}Cadastrar Disponibilidade{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <!-- Topo -->
    <div class="mb-8">

        <h2 class="text-2xl md:text-4xl font-bold text-slate-800">
            📅 Cadastrar Disponibilidade
        </h2>

        <p class="text-slate-500 mt-1">
            Defina os dias e horários disponíveis para atendimento
        </p>

    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8">

        <form method="POST" class="space-y-6">

            {% csrf_token %}

            <!-- Profissional -->
            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Profissional
                </label>

                <select name="profissional"
                        required
                        class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                    {% for p in profissionais %}
                        <option value="{{ p.id }}">
                            {{ p.nome }}
                        </option>
                    {% endfor %}

                </select>

            </div>

            <!-- Dias da Semana -->
            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-3">
                    Dias da Semana
                </label>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

                    {% for dia in dias_semana %}

                    <label class="flex items-center gap-3 border border-slate-200 rounded-xl px-4 py-3 hover:bg-slate-50 cursor-pointer">

                        <input type="checkbox"
                               name="dias_semana"
                               value="{{ dia.0 }}"
                               class="w-4 h-4 text-violet-600 rounded">

                        <span class="text-slate-700 font-medium">
                            {{ dia.1 }}
                        </span>

                    </label>

                    {% endfor %}

                </div>

            </div>

            <!-- Horários -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Hora Início
                    </label>

                    <input type="time"
                           name="hora_inicio"
                           required
                           class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                </div>

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Hora Fim
                    </label>

                    <input type="time"
                           name="hora_fim"
                           required
                           class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                </div>

            </div>

            <!-- Botões -->
            <div class="flex flex-col md:flex-row gap-3 pt-2">

                <a href="{% url 'disponibilidade_list' %}"
                   class="w-full md:w-auto text-center bg-slate-600 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-semibold">
                    Cancelar
                </a>

                <button type="submit"
                        class="w-full md:w-auto bg-violet-600 hover:bg-violet-700 text-white px-6 py-3 rounded-xl font-semibold shadow-sm">
                    💾 Salvar Disponibilidade
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
