{% extends "clinica/base.html" %}

{% block title %}Editar Disponibilidade{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <!-- Topo -->
    <div class="mb-8">

        <h2 class="text-2xl md:text-4xl font-bold text-slate-800">
            ✏️ Editar Disponibilidade
        </h2>

        <p class="text-slate-500 mt-1">
            Atualize os horários e dias disponíveis do profissional
        </p>

    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8">

        <form method="post" class="space-y-6">

            {% csrf_token %}

            <!-- Profissional -->
            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Profissional
                </label>

                <select name="profissional"
                        required
                        class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                    {% for p in profissionais %}

                        <option value="{{ p.id }}"
                            {% if p.id == disponibilidade.profissional.id %}
                                selected
                            {% endif %}>
                            {{ p.nome }}
                        </option>

                    {% endfor %}

                </select>

            </div>

            <!-- Dia da Semana -->
            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Dia da Semana
                </label>

                <select name="dia_semana"
                        required
                        class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                    {% for dia in dias_semana %}

                        <option value="{{ dia.0 }}"
                            {% if dia.0 == disponibilidade.dia_semana %}
                                selected
                            {% endif %}>
                            {{ dia.1 }}
                        </option>

                    {% endfor %}

                </select>

            </div>

            <!-- Horários -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Hora Início
                    </label>

                    <input type="time"
                           name="hora_inicio"
                           value="{{ disponibilidade.hora_inicio|time:'H:i' }}"
                           required
                           class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                </div>

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Hora Fim
                    </label>

                    <input type="time"
                           name="hora_fim"
                           value="{{ disponibilidade.hora_fim|time:'H:i' }}"
                           required
                           class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 focus:outline-none">

                </div>

            </div>

            <!-- Botões -->
            <div class="flex flex-col md:flex-row gap-3 pt-2">

                <a href="{% url 'disponibilidade_list' %}"
                   class="w-full md:w-auto text-center bg-slate-600 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-semibold">
                    Cancelar
                </a>

                <button type="submit"
                        class="w-full md:w-auto bg-violet-600 hover:bg-violet-700 text-white px-6 py-3 rounded-xl font-semibold shadow-sm">
                    💾 Salvar Alterações
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
