<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVIDADE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Área da Clínica</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
        }

        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .logo {
            font-weight: 600;
            font-size: 22px;
            color: #0d6efd;
        }

        .subtitle {
            font-size: 14px;
            color: #6c757d;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        .footer-link {
            font-size: 13px;
            text-decoration: none;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">

        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">

                    <!-- Logo -->
                    <div class="text-center mb-4">
                        <div class="logo">🦷 SeuSistema</div>
                        <div class="subtitle">Acesso da Clínica</div>
                    </div>

                    {% if error %}
                        <div class="alert alert-danger text-center">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <input
                                type="text"
                                name="username"
                                class="form-control form-control-lg"
                                placeholder="Digite seu usuário"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input
                                type="password"
                                name="password"
                                class="form-control form-control-lg"
                                placeholder="Digite sua senha"
                                required
                            >
                        </div>

                        <div class="d-flex justify-content-end mb-3">
                            <a href="{% url 'password_reset' %}"  class="footer-link text-primary">
                                Esqueci minha senha
                            </a>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg w-100 mb-3">
                            Entrar
                        </button>

                        <div class="text-center">
                            <small class="text-muted">
                                Ainda não tem acesso?
                                <a href="#" class="footer-link text-primary">
                                    Falar com suporte
                                </a>
                            </small>
                        </div>

                    </form>

                </div>
            </div>

            <!-- Rodapé -->
            <div class="text-center mt-3">
                <small class="text-white-50">
                    © 2026 SeuSistema • Todos os direitos reservados
                </small>
            </div>

        </div>

    </div>
</div>

</body>
</html>
