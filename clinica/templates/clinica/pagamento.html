{% extends "clinica/base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm">

    <h1 class="text-3xl font-bold text-slate-800 mb-6">
        💳 Pagamento
    </h1>

    <div class="space-y-4">

        <div>
            <p class="text-slate-500">Plano</p>

            <p class="text-xl font-semibold">
                {{ assinatura.plano.nome }}
            </p>
        </div>

        <div>
            <p class="text-slate-500">Valor</p>

            <p class="text-3xl font-bold text-violet-600">
                R$ {{ assinatura.valor }}
            </p>
        </div>

    </div>

    <div class="mt-8">

        <button
    onclick="copiarPix()"
    class="mt-4 w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl font-semibold">

    Copiar PIX

</button>
        <div class="flex justify-center mb-6">

            <img
                src="data:image/png;base64,{{ qr_code_base64 }}"
                class="w-64 h-64 mx-auto">

        </div>
        <textarea
    readonly
    class="w-full border rounded-xl p-4 h-32">{{ codigo_pix }}</textarea>

    </div>

</div>
<script>

function copiarPix() {

    const codigoPix = `{{ codigo_pix }}`;

    navigator.clipboard.writeText(codigoPix);

    alert('PIX copiado!');

}

</script>

{% endblock %}
