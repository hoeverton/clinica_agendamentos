{% extends "clinica/base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <!-- Topo -->
    <div class="mb-8">

        <h2 class="text-2xl md:text-4xl font-bold text-slate-800">

            {% if form.instance.pk %}
                ✏️ Editar Profissional
            {% else %}
                ➕ Cadastrar Profissional
            {% endif %}

        </h2>

        <p class="text-slate-500 mt-1">
            Cadastre ou atualize os dados do profissional
        </p>

    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8">

        <form method="post" class="space-y-6">

            {% csrf_token %}

            <!-- Campos -->
            <div class="space-y-5">

                {{ form.as_p }}

            </div>

            <!-- Botões -->
            <div class="flex flex-col md:flex-row gap-3 pt-4">

                <a href="{% url 'profissional_list' %}"
                   class="w-full md:w-auto text-center bg-slate-600 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-semibold">
                    Cancelar
                </a>

                <button type="submit"
                        class="w-full md:w-auto bg-violet-600 hover:bg-violet-700 text-white px-6 py-3 rounded-xl font-semibold shadow-sm">
                    💾 Salvar
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
