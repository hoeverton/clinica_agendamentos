<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste SaaS</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-gray-900 text-gray-300 flex flex-col">

        <!-- LOGO -->
        <div class="p-4 text-white text-lg font-bold border-b border-gray-800">
            🦷 Clínica
        </div>

        <!-- MENU -->
        <nav class="flex-1 p-3 space-y-1">

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg bg-gray-800 text-white">
                <i data-lucide="home"></i>
                <span>Dashboard</span>
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="calendar"></i>
                <span>Disponibilidades</span>
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="calendar-days"></i>
                <span>Agendamentos</span>
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="folder"></i>
                <span>Prontuário</span>
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="stethoscope"></i>
                <span>Serviços</span>
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="users"></i>
                <span>Profissionais</span>
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="bar-chart"></i>
                <span>Relatórios</span>
            </a>

        </nav>

        <!-- FOOTER -->
        <div class="p-3 border-t border-gray-800 space-y-1">

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 hover:text-white">
                <i data-lucide="user"></i>
                <span>Minha Conta</span>
            </a>

            <button
                class="flex items-center gap-3 px-3 py-2 rounded-lg text-red-400 hover:bg-red-500 hover:text-white w-full">
                <i data-lucide="log-out"></i>
                <span>Sair</span>
            </button>

        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="flex-1 p-6">

        <h1 class="text-2xl font-bold mb-4">Dashboard</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Agendamentos</p>
                <h2 class="text-xl font-bold">120</h2>
            </div>

            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Profissionais</p>
                <h2 class="text-xl font-bold">8</h2>
            </div>

            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Serviços</p>
                <h2 class="text-xl font-bold">25</h2>
            </div>

        </div>

    </main>

</div>

<!-- ATIVA OS ÍCONES -->
<script>
    lucide.createIcons();
</script>

</body>
</html>
