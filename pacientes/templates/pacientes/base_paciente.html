<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Área do Paciente{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">

        <!-- LOGO / TÍTULO -->
        <a class="navbar-brand fw-semibold"
           href="{% url 'dashboard_paciente' %}">
            🦷 Área do Paciente
        </a>

        <!-- BOTÃO MOBILE -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarPaciente"
                aria-controls="navbarPaciente"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse mt-3 mt-lg-0"
             id="navbarPaciente">

            <div class="ms-auto d-flex flex-column flex-lg-row gap-2">

                <!-- DASHBOARD -->
                <a href="{% url 'dashboard_paciente' %}"
                   class="btn btn-sm btn-light">
                    Dashboard
                </a>

                <!-- NOVO AGENDAMENTO -->
                {% if request.session.clinica_slug %}
                    <a href="{% url 'agendar_logado' request.session.clinica_slug %}"
                       class="btn btn-sm btn-success">
                        Novo Agendamento
                    </a>
                {% endif %}

                <!-- LOGOUT -->
                <a href="{% url 'logout_paciente' %}"
                   class="btn btn-sm btn-outline-light">
                    Sair
                </a>

            </div>

        </div>

    </div>
</nav>

<!-- ================= CONTEÚDO ================= -->
<main class="container mt-4">

    {% block content %}
    {% endblock %}

</main>

<!-- ================= BOOTSTRAP JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
