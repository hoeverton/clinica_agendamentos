<!-- cadastro.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 md:p-10 rounded-2xl shadow-lg w-full max-w-md md:max-w-lg">
  <h1 class="text-3xl font-bold text-center mb-6">Criar conta</h1>
  {% if erro %}
    <p class="text-red-500 mb-4 text-center">{{ erro }}</p>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="mb-4">
      <label class="block mb-1">Nome da clínica</label>      
      <input type="text" name="nome" value="{{ nome }}" required class="w-full px-4 py-2 border rounded-xl">
    </div>

    <div class="mb-4">
      <label class="block mb-1">Email</label>
      <input type="email" name="email" value="{{ email }}" required class="w-full px-4 py-2 border rounded-xl">
    </div>

    <div class="mb-6">
      <label class="block mb-1">Senha</label>
      <input type="password" name="senha" required class="w-full px-4 py-2 border rounded-xl">
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">
      Criar conta
    </button>
  </form>
  
</div>

</body>
</html>
