<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo - Sistema Odonto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md">
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">Acesse a Demonstração</h1>
    <p class="text-gray-500 mt-2">Teste o sistema antes de contratar</p>
  </div>

  <form>
    <div class="mb-4">
      <label class="block text-gray-700 mb-2">Email</label>
      <input type="email" value="demo@clinica.com" class="w-full px-4 py-2 border rounded-xl bg-gray-100">
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 mb-2">Senha</label>
      <input type="password" value="123456" class="w-full px-4 py-2 border rounded-xl bg-gray-100">
    </div>

    <button type="button" onclick="entrarDemo()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">
      Entrar na demonstração
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-6">
    Não precisa cadastrar • Acesso imediato
  </p>
</div>

<script>
function entrarDemo() {
  alert("Redirecionando para o sistema demo...");
  window.location.href = "/dashboard"; // ajuste para sua rota real
}
</script>

</body>
</html>
