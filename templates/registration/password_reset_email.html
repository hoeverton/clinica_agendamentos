<div style="font-family: Arial, sans-serif; background:#f4f6f8; padding:40px;">
    
    <div style="max-width:500px; margin:auto; background:white; padding:30px; border-radius:10px; text-align:center;">
        
        <h2 style="color:#333;">🔐 Recuperação de senha</h2>

        <p style="color:#555;">
            Recebemos uma solicitação para redefinir sua senha.
        </p>

        <p style="color:#555;">
            Clique no botão abaixo:
        </p>

        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
           style="display:inline-block; margin-top:20px; background:#28a745; color:#fff; padding:12px 25px; border-radius:6px; text-decoration:none; font-weight:bold;">
            Redefinir senha
        </a>

        <p style="margin-top:30px; font-size:12px; color:#999;">
            Se você não solicitou isso, ignore este email.
        </p>

    </div>

</div>
