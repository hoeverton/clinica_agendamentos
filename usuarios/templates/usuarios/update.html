{% extends 'clinica/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm col-md-6 mx-auto">
        <div class="card-body">

            <h4 class="mb-4 text-center">✏️ Editar Usuário</h4>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Usuário</label>
                    <input type="text" name="username" class="form-control" value="{{ usuario.username }}" required>
                </div>

                <div class="mb-3">
                    <label>Tipo de Usuário</label>
                    <select name="grupo" class="form-control">

                        {% for grupo in grupos %}
                            <option value="{{ grupo.name }}"
                                {% if grupo in usuario.groups.all %}selected{% endif %}>
                                {{ grupo.name }}
                            </option>
                        {% endfor %}

                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'usuarios_list' %}" class="btn btn-secondary">
                        Voltar
                    </a>

                    <button type="submit" class="btn btn-success">
                        Atualizar
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
